name: Build and Verify MyUnixOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required to check commit history

    # 1. ENFORCE LEGAL NAME ATTRIBUTION
    - name: Verify Author Legal Name
      run: |
        AUTHOR_NAME=$(git log -1 --format='%an')
        echo "Last commit author: $AUTHOR_NAME"
        if [[ ! "$AUTHOR_NAME" =~ \  ]]; then
          echo "❌ ERROR: Commit author '$AUTHOR_NAME' must be a full legal name (First Last)."
          exit 1
        fi
        echo "✅ Legal name check passed."

    # 2. INSTALL CROSS-COMPILER TOOLCHAIN
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-i686-linux-gnu binutils-i686-linux-gnu nasm xorriso mtools grub-pc-bin

    # 3. BUILD THE KERNEL
    - name: Build Kernel
      run: |
        # Point to the cross-compiler installed by apt
        export CC=i686-linux-gnu-gcc
        export LD=i686-linux-gnu-ld
        export OBJCOPY=i686-linux-gnu-objcopy
        
        # Make the build script executable and run it
        chmod +x build_boot.sh
        ./build_boot.sh
        
